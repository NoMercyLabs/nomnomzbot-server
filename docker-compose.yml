services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=nomercybot;Username=nomercybot;Password=nomercybot_pass
      - Jwt__Secret=change-me-docker-secret-key-at-least-32-chars!
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nomercybot

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nomercybot
      POSTGRES_USER: nomercybot
      POSTGRES_PASSWORD: nomercybot_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomercybot -d nomercybot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nomercybot

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nomercybot

volumes:
  postgres_data:

networks:
  nomercybot:
    driver: bridge
